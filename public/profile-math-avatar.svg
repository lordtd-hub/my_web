<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" role="img" aria-labelledby="title desc">
  <title id="title">Mathematics profile avatar</title>
  <desc id="desc">Abstract academic profile image with initials and mathematical curves.</desc>
  <defs>
    <linearGradient id="bg" x1="64" x2="576" y1="40" y2="600" gradientUnits="userSpaceOnUse">
